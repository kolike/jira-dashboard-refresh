<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #09090b;
      --card: #18181b;
      --border: rgba(255,255,255,.12);
      --accent: #3b82f6;
      --text: #fff;
      --dim: #cbd5e1;
    }
    body {
      margin: 0;
      width: 360px;
      font-family: Inter, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px;
    }
    .title {
      font-size: 12px;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 6px;
      font-weight: 700;
      letter-spacing: .06em;
    }
    input, textarea, select {
      width: 100%;
      box-sizing: border-box;
      background: #27272a;
      color: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      font-size: 13px;
    }
    textarea {
      min-height: 76px;
      resize: vertical;
      font-family: inherit;
    }
    .row {
      display: flex;
      gap: 8px;
    }
    .row > * {
      flex: 1;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 11px 12px;
      font-weight: 800;
      cursor: pointer;
    }
    .ghost {
      background: transparent;
      border: 1px solid var(--border);
    }
    .hint {
      color: var(--dim);
      font-size: 11px;
      line-height: 1.35;
      margin-top: 6px;
    }
    label.switch {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <label class="switch">
        <span>Мониторинг</span>
        <input id="enabled" type="checkbox">
      </label>
    </div>

    <div class="card">
      <div class="title">Base URL</div>
      <input id="baseUrl" value="https://jira.vseinstrumenti.ru">
    </div>

    <div class="card">
      <div class="title">PAT Token</div>
      <input id="token" type="password" placeholder="Вставь новый PAT">
      <div class="hint">Токен хранится локально в storage расширения.</div>
    </div>

    <div class="card">
      <div class="title">Интервал</div>
      <select id="interval">
        <option value="30">30 секунд</option>
        <option value="60">60 секунд</option>
        <option value="120">2 минуты</option>
        <option value="300">5 минут</option>
      </select>
    </div>

    <div class="card">
      <div class="title">Priority JQL</div>
      <textarea id="jqlPriority"></textarea>
    </div>

    <div class="card">
      <div class="title">Transient JQL</div>
      <textarea id="jqlTransient"></textarea>
    </div>

    <div class="row">
      <button id="save">Сохранить</button>
      <button id="runNow" class="ghost">Проверить сейчас</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
